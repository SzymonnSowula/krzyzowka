<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jolka - Krzyżówka Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <h1>Krzyżówka</h1>
        <p class="subtitle">Rozwiąż zagadki, trenuj umysł.</p>
    </header>

    <main class="app-container">
        <div class="crossword-wrapper">
            <div id="crossword-grid" class="crossword-grid"></div>
        </div>
        
        <aside class="interaction-panel">
            <div class="active-clue-container">
                <h2 id="active-clue-title">Wybierz pytanie</h2>
                <p id="active-clue-text" class="clue-text">Kliknij na dowolne pytanie w krzyżówce, aby rozpocząć.</p>
            </div>
            
            <div class="input-container" id="input-container" style="display: none;">
                <label for="word-input" class="input-label">Twoja odpowiedź:</label>
                <div class="input-group">
                    <input type="text" id="word-input" class="word-input" placeholder="Wpisz słowo lub literę..." autocomplete="off">
                    <button id="submit-word" class="btn primary-btn">Zatwierdź</button>
                </div>
                
                <div class="actions-group">
                    <button id="btn-dont-know" class="btn secondary-btn danger-hover">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        Nie umiem
                    </button>
                    <button id="btn-hint" class="btn secondary-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        Podpowiedź litery
                    </button>
                </div>
            </div>
            
            <div class="info-card">
                <h3>Jak grać?</h3>
                <ul>
                    <li>Kliknij w komórkę na planszy, by pisać bezpośrednio.</li>
                    <li>Użyj strzałek na klawiaturze, by się poruszać.</li>
                    <li>Kliknij w pytanie, by wpisać całe słowo w panelu.</li>
                </ul>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
